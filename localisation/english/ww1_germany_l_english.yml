 #National Focuses
 GER_gott_mit_uns:0 "Gott Mit Uns"
 GER_gott_mit_uns_desc:0 "Here we are, the beacon of European culture, industry, trade, and empire. However, the combined power of America, Russia, Britain, and France, encircle us on every front, the German people are surrounded. War is inevitable. Germany will be victorious, if we are to challenge the inevitable rise of the Anglo-Saxons of America, every step forward must be a step to victory!"
 GER_hollwegs_chancellorship:0 "Hollweg's Chancellorship"
 GER_hollwegs_chancellorship_desc:0 "Kaiser Wilhelm appointed Theobald von Bethmann-Hollweg Reich Chancellor in 1909, in part because he approved of his conciliatory political style but also as he could appease the idea of liberalization whilst also staying true to the Kaiser's command. However, that's not to say that Hollweg agrees with the Kaiser's rule..."
 GER_weltpolitik:0 "Weltpolitik"
 GER_weltpolitik_desc:0 "Weltpolitik, simply, is the policy our empire must take to transform Germany into a hyper-power. However, it is not the aim of Weltpolitik to shove others out of the sun, but to ensure Germany's place in it. Hence, the main effort of Weltpolitik is to ensure that Germany does not face a two-front war, but as the clock strikes closer and closer to midnight this goal may be impossible."
 GER_nationalstaat:0 "Nationalstaat"
 GER_nationalstaat_desc:0 "Germany was founded as a nation-state, a state that is based off a shared national identity, yet some of our territories do not embrace our shared Germanic culture and instead opt to celebrate their local identity, in order to centralise our empire this must be discouraged - especially in Alsace-Lorraine where the French and local culture still thrives."
 GER_a_constitution_for_alsace_lorraine:0 "A Constitution for Alsace-Lorraine"
 GER_a_constitution_for_alsace_lorraine_desc:0 "Alsace-Lorraine does not retain the same rights as the other states in the empire enjoy, the bill proposed will form a federal state that shall be headed by a Statthalter, who, at the recommendation of the Bundesrat, will be appointed for life by the Kaiser. On top of this it will grant the state more say in the empire's workings through democratic methods."

 #Country Ideas
 GER_idea_germany_encircled:0 "Germany Encircled"
 GER_idea_germany_encircled_desc:0 "Ever since the creation of the German Empire in 1866 by the political manoeuvring of chancellor Bismark, the idea of a Germany united has put fear into the European nations because we possess the god given ability, to put simply, conquer. Not just by military might, but as this new century begins to unfold it's clear that Germany has the ability to dominate in the global market, and impose its diplomatic influence globally.\n\nThis innate ability of the Germanic peoples has drove the British, French, and Russians to form an alliance against us, even if they say otherwise, and so, we are encircled. It must be our aim to ready ourselves for a great war, as the chances of being able to make peace with these powers are next to none. Bismark's desperation for an alliance which ended up with our foreign policy tied to Austria's has turned out to be more of a crutch than a stable foundation, as it has isolated us from Russia after their return to European politics following their defeat to the Japanese in 1905. Our inability to come to terms with France is self-explanatory, their humiliation resulted into the creation of our very country. Perhaps the most brightest prospect, Britian, could of been placated, but the Kaiser's personal hatred for the country has stumped any progress - only by the chancellor's, Theobald von Bethmann-Hollweg's, consistent efforts to come to terms with the British have they kept their commitments to the Entente... inconsistent, to say the least.\n\nAlas, Germany is aware of the threat to its very existence and we must prepare."
 GER_idea_weltpolitik:0 "Weltpolitik"
 GER_idea_weltpolitik_desc:0 "Weltpolitik is our method of foreign policy originating from 1897 when the foreign minister, Bernhard von Bülow, told the Reichstag '"in one word; We wish to throw no one into the shade, but we also demand our own place in the sun.' This idea of diplomacy is a breakaway from Bismark's defensive policy and instead it is now seen as the duty of foreign policy to expand Germany's prestige through colonial endeavours whilst also making efforts to prevent a two-front war.\n\nHowever, as with all things in this era, it is more complex than that, unfortunately for us, colonial prestige and preventing a two-front war often come as conflicting policies, and as of recent has driven away the UK which in turn had brought Russia closer to the Entente, as if the Balkan mess was not already reason enough. The choice between colonial prestige and the prevention of a two-front war rests with the Kaiser who has made no keen effort to make amends with Russia, but as we sail through this new decade, we may see progress yet."

 #Opinion Modifiers
 GER_germinifcation_of_french_territories:0 "Germinification of French territories"